{% extends 'base.html' %}
{% block title %}Delete Holiday - HRMS{% endblock %}
{% block content %}
<div class="card card-dash" style="max-width:480px;margin:2rem auto;">
    <div class="card-body text-center py-5">
        <div class="delete-icon mb-3"><i class="bi bi-calendar-x-fill"></i></div>
        <h4>Delete Holiday?</h4>
        <p class="text-muted">Delete <strong>{{ holiday.name }}</strong> ({{ holiday.date|date:"d M Y" }})?</p>
        <form method="POST">{% csrf_token %}
            <a href="{% url 'holiday_list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-danger">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
