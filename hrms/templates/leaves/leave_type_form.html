{% extends 'base.html' %}
{% block title %}{{ title }} - HRMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ title }}</h1>
    <a href="{% url 'leave_type_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card card-form" style="max-width:500px;">
    <form method="POST">{% csrf_token %}
        <div class="form-section">
            <div class="row g-3">
                <div class="col-12"><label class="form-label">Name</label>{{ form.name }}</div>
                <div class="col-12"><label class="form-label">Max Days Per Year</label>{{ form.max_days_per_year }}</div>
                <div class="col-12"><label class="form-label">Description</label>{{ form.description }}</div>
                <div class="col-12">
                    <div class="form-check"><label class="form-check-label">{{ form.is_paid }} Paid Leave</label></div>
                </div>
            </div>
        </div>
        <div class="form-actions">
            <a href="{% url 'leave_type_list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-primary">Save</button>
        </div>
    </form>
</div>
{% endblock %}
