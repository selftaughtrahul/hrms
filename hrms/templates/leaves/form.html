{% extends 'base.html' %}
{% block title %}{{ title }} - HRMS{% endblock %}
{% block content %}
<div class="page-header">
    
    <a href="{% url 'leave_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card card-form" style="max-width:600px;">
    <form method="POST">{% csrf_token %}
        <div class="form-section">
            <div class="row g-3">
                <div class="col-12"><label class="form-label">Employee</label>{{ form.employee }}</div>
                <div class="col-12"><label class="form-label">Leave Type</label>{{ form.leave_type }}</div>
                <div class="col-md-6"><label class="form-label">Start Date</label>{{ form.start_date }}</div>
                <div class="col-md-6"><label class="form-label">End Date</label>{{ form.end_date }}</div>
                <div class="col-12"><label class="form-label">Reason</label>{{ form.reason }}</div>
            </div>
        </div>
        <div class="form-actions">
            <a href="{% url 'leave_list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-primary"><i class="bi bi-send me-1"></i>Submit Request</button>
        </div>
    </form>
</div>
{% endblock %}
