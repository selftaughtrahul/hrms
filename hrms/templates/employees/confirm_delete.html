{% extends 'base.html' %}
{% block title %}Confirm Delete - HRMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">Delete Employee</h1>
</div>
<div class="card card-dash" style="max-width:500px;margin:0 auto;">
    <div class="card-body text-center py-5">
        <div class="delete-icon mb-3"><i class="bi bi-person-x-fill"></i></div>
        <h4>Are you sure?</h4>
        <p class="text-muted mb-4">You are about to delete <strong>{{ employee.get_full_name }}</strong> ({{ employee.employee_id }}). This action cannot be undone.</p>
        <form method="POST">
            {% csrf_token %}
            <a href="{% url 'employee_list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Yes, Delete</button>
        </form>
    </div>
</div>
{% endblock %}
