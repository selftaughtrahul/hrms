{% extends 'base.html' %}
{% block title %}{{ title }} - HRMS{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="page-title">{{ title }}</h1>
    <a href="{% url 'department_list' %}" class="btn btn-outline-secondary"><i class="bi bi-arrow-left me-1"></i>Back</a>
</div>
<div class="card card-form" style="max-width:500px;">
    <form method="POST">{% csrf_token %}
        <div class="form-section">
            <div class="mb-3"><label class="form-label">Department Name</label>{{ form.name }}</div>
            <div class="mb-3"><label class="form-label">Description</label>{{ form.description }}</div>
        </div>
        <div class="form-actions">
            <a href="{% url 'department_list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-primary">Save Department</button>
        </div>
    </form>
</div>
{% endblock %}
