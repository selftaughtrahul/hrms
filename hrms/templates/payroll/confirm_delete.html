{% extends 'base.html' %}
{% block title %}Delete Payroll - HRMS{% endblock %}
{% block content %}
<div class="card card-dash" style="max-width:480px;margin:2rem auto;">
    <div class="card-body text-center py-5">
        <div class="delete-icon mb-3"><i class="bi bi-cash-stack"></i></div>
        <h4>Delete Payroll Record?</h4>
        <p class="text-muted">Delete payroll for <strong>{{ payroll.employee.get_full_name }}</strong> — {{ payroll.get_month_display }} {{ payroll.year }}?</p>
        <form method="POST">{% csrf_token %}
            <a href="{% url 'payroll_list' %}" class="btn btn-outline-secondary me-2">Cancel</a>
            <button type="submit" class="btn btn-danger">Delete</button>
        </form>
    </div>
</div>
{% endblock %}
