name: Django CI with Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker Image
      run: |
        docker build -t hrms-app .
        
    - name: Run SaaS Tests in Docker
      run: |
        docker run --rm \
          -e SECRET_KEY="ci-test-key-not-for-production" \
          -e DEBUG="True" \
          hrms-app \
          python hrms/manage.py test core.tests_saas
