name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r hrms/requirements.txt
        
    - name: Run SaaS Tests
      working-directory: ./hrms
      run: |
        python manage.py test core.tests_saas
      env:
        SECRET_KEY: "ci-test-key-not-for-production"
        DEBUG: "True"
