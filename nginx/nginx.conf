upstream hrms_app {
    server web:8000;
}

server {
    listen 80;

    client_max_body_size 20M;

    location / {
        proxy_pass http://hrms_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }

    location /static/ {
        alias /app/hrms/staticfiles/;
    }

    location /media/ {
        alias /app/hrms/media/;
    }
}
